<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL CAPO DEL AUDIO | BÚNKER GLOBAL</title>
    <style>
        :root { --oro: #d4af37; --negro: #050505; --rojo: #ff0000; }
        body { background: #000; color: #fff; font-family: 'Trebuchet MS', sans-serif; text-align: center; padding: 20px; user-select: none; }
        .bunker { max-width: 440px; margin: auto; background: var(--negro); border: 1px solid #222; border-radius: 20px; padding: 30px; box-shadow: 0 0 50px rgba(212,175,55,0.1); }
        h1 { font-size: 1.7rem; color: var(--oro); text-transform: uppercase; font-weight: 900; margin-bottom: 5px; }
        .sub { font-size: 0.65rem; color: #555; letter-spacing: 3px; margin-bottom: 20px; }
        .consola { background: #000; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 0.75rem; text-align: left; border-left: 4px solid var(--oro); margin-bottom: 20px; color: #777; }
        .btn { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; }
        .btn-grab { background: #1a0000; color: var(--rojo); border: 1px solid #400; }
        .btn-master { background: var(--oro); color: #000; font-size: 1rem; }
        .pago { display: flex; justify-content: space-between; background: #0a0a0a; padding: 14px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #1a1a1a; text-decoration: none; color: #fff; font-size: 0.8rem; }
        .monto { color: var(--oro); font-weight: bold; }
        audio { width: 100%; margin: 15px 0; filter: invert(1); }
        #descarga { display: none; border: 1px solid var(--oro); padding: 12px; border-radius: 8px; background: #0c0a00; margin-top: 15px; }
    </style>
</head>
<body oncontextmenu="return false">
<div class="bunker">
    <h1>EL CAPO DEL AUDIO</h1>
    <div class="sub">BY ERICK SLAYER3866 | V.2026 GLOBAL</div>
    <div class="consola" id="log">> VPN SECURITY ACTIVE...<br>> <span id="slogan" style="color:var(--oro);">DISPARÁNDOLE A TUS ROLAS JODIDAS</span></div>
    
    <button id="recBtn" class="btn btn-grab" onclick="recStart()">● <span id="txt-rec">GRABAR VOZ O INSTRUMENTO</span></button>
    <button id="stopBtn" class="btn" style="display:none; background:#fff;" onclick="recStop()">■ STOP</button>
    
    <input type="file" id="inputAudio" accept="audio/*" style="width:100%; margin:10px 0;">
    <button class="btn btn-master" onclick="masterizar(false)">SOLTAR EL MÁSTER</button>

    <div id="resultado" style="display:none;">
        <audio id="player" controls controlsList="nodownload"></audio>
        <div id="lista-precios" style="margin-top:20px;"></div>
        <div id="descarga"><a id="linkD" style="color:var(--oro); text-decoration:none; font-weight:bold;">📥 DOWNLOAD MASTER</a></div>
    </div>
    
    <div id="key" style="margin-top:20px; color:#111; cursor:pointer;">♫</div>
</div>

<script>
    let rec, chunks = [], boss = false, timer, isEn = navigator.language.startsWith('en');
    if(isEn) document.getElementById('slogan').innerText = "SHOOTING YOUR TRACKS";

    // CADENERO VPN
    fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
        if(d.security && (d.security.vpn || d.security.proxy)) document.body.innerHTML = "<h1>ACCESS DENIED</h1>";
    });

    async function recStart() {
        chunks = []; const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        rec = new MediaRecorder(s); rec.ondataavailable = e => chunks.push(e.data);
        rec.onstop = () => { 
            const b = new Blob(chunks, { type: 'audio/mp3' }); 
            document.getElementById('player').src = URL.createObjectURL(b); 
            masterizar(true); 
        };
        rec.start(); document.getElementById('recBtn').style.display='none'; document.getElementById('stopBtn').style.display='block';
    }
    function recStop() { rec.stop(); document.getElementById('recBtn').style.display='block'; document.getElementById('stopBtn').style.display='none'; }

    function masterizar(grab) {
        const p = document.getElementById('player');
        if(!p.src && document.getElementById('inputAudio').files[0]) p.src = URL.createObjectURL(document.getElementById('inputAudio').files[0]);
        if(!p.src) return;

        const zona = Intl.DateTimeFormat().resolvedOptions().timeZone;
        let mon = "MXN";
        if (zona.includes("Europe")) mon = "EUR";
        else if (zona.includes("America") && !zona.includes("Mexico")) mon = "USD";

        let precios = grab ? 
            {u: (mon==="EUR"?"€90":(mon==="USD"?"$95":"$650")), o: (mon==="EUR"?"€280":(mon==="USD"?"$300":"$2150"))} :
            {u: (mon==="EUR"?"€40":(mon==="USD"?"$45":"$300")), o: (mon==="EUR"?"€220":(mon==="USD"?"$250":"$1800"))};

        const t = isEn ? ["1 TRACK", "8 TRACKS", "RATE:"] : ["1 ROLA", "8 ROLAS", "CUOTA:"];

        document.getElementById('lista-precios').innerHTML = `
            <div style="font-size:8px; color:#555; margin-bottom:5px;">${t[2]}</div>
            <a href="https://link.mercadopago.com.mx/elcapo" class="pago"><span>${t[0]}</span> <span class="monto">${precios.u} ${mon}</span></a>
            <a href="https://link.mercadopago.com.mx/elcapo" class="pago"><span>${t[1]}</span> <span class="monto">${precios.o} ${mon}</span></a>`;
        
        document.getElementById('resultado').style.display='block'; p.play();
        p.ontimeupdate = () => { if(!boss && p.currentTime >= 90) { p.pause(); p.currentTime=0; alert("PAGA AL CAPO"); }};
        document.getElementById('linkD').href = p.src;
    }

    const k = document.getElementById('key');
    k.onmousedown = () => { timer = setTimeout(() => { boss=true; document.getElementById('descarga').style.display='block'; alert("BOSS MODE"); }, 3000); };
    k.onmouseup = () => clearTimeout(timer);
</script>
</body>
</html>
