<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>EL CAPO DEL SONIDO | VOCAL ELITE STUDIO</title>
    <style>
        :root { --gold: #c5a059; --blood: #7b0000; --bg: #030303; --safety: #00ff00; }
        body { background: #000; color: #555; font-family: 'Courier New', monospace; margin: 0; padding: 10px; text-transform: uppercase; }
        
        .master-rack { 
            max-width: 1100px; margin: 0 auto; background: var(--bg); border: 4px solid #1a1a1a; 
            padding: 30px; box-shadow: 0 0 100px #000; position: relative;
        }

        .header { border-bottom: 2px solid #222; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #fff; font-size: 1.8rem; letter-spacing: 10px; margin: 0; }
        .vpn-tag { font-size: 8px; border: 1px solid #0033ff; padding: 4px; color: #0033ff; }

        .section-label { color: var(--gold); font-size: 10px; letter-spacing: 3px; display: block; margin: 25px 0 10px 0; border-left: 3px solid var(--blood); padding-left: 10px; }

        .voice-booth { background: #050505; border: 1px solid var(--blood); padding: 30px; text-align: center; margin-bottom: 20px; }
        .btn-record { background: #111; color: var(--safety); border: 1px solid var(--safety); padding: 15px; width: 100%; font-size: 1rem; letter-spacing: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-record:hover { background: var(--safety); color: #000; }
        .autotune-status { color: var(--safety); font-size: 9px; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        
        audio { width: 100%; filter: invert(1); margin-top: 20px; }

        /* TABLA DE PRECIOS: EL CAPO RATES */
        .bill-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .currency-col { background: #080808; border: 1px solid #1a1a1a; padding: 10px; }
        .currency-col h4 { color: var(--gold); font-size: 9px; text-align: center; border-bottom: 1px solid #222; margin-top: 0; padding-bottom: 5px; }
        .tier { padding: 6px 0; display: flex; justify-content: space-between; align-items: center; font-size: 8px; border-bottom: 1px solid #111; }
        .pay-link { background: #009ee3; color: #fff; text-decoration: none; padding: 4px 8px; font-weight: bold; font-size: 8px; }

        .legal-box { 
            margin-top: 30px; background: #080808; border: 1px solid #222; padding: 20px; 
            font-size: 9px; line-height: 1.5; color: #444; text-align: justify;
        }

        #dl-zone { display: none; margin-top: 20px; border: 1px solid var(--safety); padding: 15px; text-align: center; }
        .dl-btn { color: var(--safety); text-decoration: none; font-weight: bold; letter-spacing: 5px; font-size: 1rem; }

        /* LLAVE MAESTRA INVISIBLE */
        #pentagrama-key { position: absolute; bottom: 0; right: 0; width: 45px; height: 45px; background: transparent; z-index: 1000; }
    </style>
</head>
