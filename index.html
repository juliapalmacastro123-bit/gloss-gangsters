<script>
    let isPaid = false;

    function fullUnlock() {
        setTimeout(() => {
            isPaid = true;
            document.getElementById('dl-link').style.display = 'block';
            document.getElementById('log').innerHTML = "> TRANSACTION VERIFIED<br>> FULL VERSION UNLOCKED<br>> DOWNLOAD READY";

    function process() {
        const file = document.getElementById('audioFile').files[0];
        if(!file) return alert("SUBE TU ROLA");
        const p = document.getElementById('player');
        p.src = URL.createObjectURL(file);
        document.getElementById('dl-link').href = p.src;
        document.getElementById('dl-link').download = "GLOSS_MASTER_" + file.name;
        
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let source = audioCtx.createMediaElementSource(p);
        
        let sub = audioCtx.createBiquadFilter(); sub.type = "lowshelf"; sub.frequency.value = 60; sub.gain.value = 16;
        let shine = audioCtx.createBiquadFilter(); shine.type = "peaking"; shine.frequency.value = 5200; shine.gain.value = 13;
        let limit = audioCtx.createDynamicsCompressor(); limit.threshold.value = -32; limit.ratio.value = 18;
        
        source.connect(sub).connect(shine).connect(limit).connect(audioCtx.destination);
        document.getElementById('result').style.display = 'block';
        document.getElementById('detonador').classList.add('unlocked');
        p.play();

        p.ontimeupdate = function() {
            if(!isPaid && p.currentTime >= 90) {
                p.pause();
                p.currentTime = 0;
                alert("MUESTRA TERMINADA. PAGA PARA DESBLOQUEAR EL TRACK COMPLETO.");

        };
    }
</script>
